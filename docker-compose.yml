# Neo4j 与 config/config.py 中 NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD 对齐（默认 neo4j / password）
services:
  neo4j:
    image: neo4j:5-community
    container_name: biyelunwen-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
