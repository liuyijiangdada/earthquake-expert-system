<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震智能问答 · 知识图谱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-deep: #0c1222;
            --bg-card: #121a2e;
            --bg-chat: #0e1528;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8ecf4;
            --muted: #8b95a8;
            --accent: #3d9eff;
            --accent-dim: #2563c4;
            --safe: #34d399;
            --warn: #fbbf24;
            --danger: #f87171;
            --user-bubble: linear-gradient(135deg, #1e4a8f 0%, #2563eb 100%);
            --bot-bubble: #1a2438;
            --chip: rgba(61, 158, 255, 0.15);
            --chip-hover: rgba(61, 158, 255, 0.28);
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* subtle seismic grid + glow */
        .page-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.25), transparent),
                linear-gradient(180deg, #0c1222 0%, #0a0f1a 100%);
            z-index: -1;
        }
        .page-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 39px,
                rgba(255, 255, 255, 0.02) 39px,
                rgba(255, 255, 255, 0.02) 40px
            );
            opacity: 0.5;
        }

        .app-header {
            border-bottom: 1px solid var(--border);
            background: rgba(12, 18, 34, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.02em;
        }
        .app-header .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin: 0.25rem 0 0;
        }
        .badge-pill {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            background: rgba(52, 211, 153, 0.15);
            color: var(--safe);
            border: 1px solid rgba(52, 211, 153, 0.35);
        }

        .card-dark {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-dark .card-h {
            padding: 0.9rem 1.15rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-dark .card-b { padding: 1rem; }

        .chat-wrap {
            display: flex;
            flex-direction: column;
            min-height: 520px;
            max-height: min(72vh, 720px);
        }
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--bg-chat);
            border-radius: 12px;
            border: 1px solid var(--border);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) transparent;
        }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: var(--accent-dim);
            border-radius: 3px;
        }

        .msg-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.1rem;
            animation: fadeIn 0.35s ease;
        }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-block { margin-bottom: 0.35rem; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .msg-avatar.bot {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff;
        }
        .msg-avatar.user {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
        }
        .msg-bubble {
            max-width: min(100%, 640px);
            padding: 0.85rem 1.05rem;
            border-radius: 14px;
            font-size: 0.95rem;
        }
        .msg-row.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
        }
        .msg-meta {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }
        .msg-block.bot .msg-meta { padding-left: calc(38px + 0.75rem); }
        .msg-block.user .msg-meta { text-align: right; padding-right: calc(38px + 0.75rem); }
        .hint-bar {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.5rem;
            padding: 0 0.25rem;
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.85rem;
        }
        .quick-chips label {
            font-size: 0.75rem;
            color: var(--muted);
            width: 100%;
            margin-bottom: 0.15rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            background: var(--chip);
            color: var(--text);
            border: 1px solid transparent;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .chip:hover {
            background: var(--chip-hover);
            border-color: rgba(61, 158, 255, 0.4);
        }
        .chip i { font-size: 0.75rem; opacity: 0.85; }

        .composer {
            margin-top: 0.85rem;
        }
        .composer textarea {
            background: #0a101f;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            resize: none;
            min-height: 48px;
            max-height: 140px;
        }
        .composer textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 158, 255, 0.15);
            outline: none;
        }
        .composer .btn-send {
            border-radius: 12px;
            padding: 0.65rem 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: #fff;
        }
        .composer .btn-send:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .composer .btn-ghost {
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: transparent;
        }
        .composer .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 0.5rem 0;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.2s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.65rem;
        }
        @media (max-width: 991px) {
            .stat-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .stat-tile {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
        }
        .stat-tile .val {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-tile .lbl {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        .chart-box {
            height: 260px;
            width: 100%;
        }
        .chart-box.tall { height: 300px; }

        .feedback-row {
            margin-top: 0.65rem;
            padding-top: 0.65rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .feedback-row .btn-sm {
            border-radius: 8px;
            font-size: 0.78rem;
        }
        .disclaimer {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="app-header">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                <div>
                    <h1><i class="fas fa-wave-square text-info me-2"></i>地震智能问答工作台</h1>
                    <p class="subtitle">知识图谱检索 + 大模型推理 · 面向公众科普与应急认知</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge-pill" id="connBadge"><i class="fas fa-link me-1"></i>服务已连接</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-dark h-100">
                    <div class="card-h text-white">
                        <i class="fas fa-comments text-info"></i>
                        对话区
                    </div>
                    <div class="card-b">
                        <div class="quick-chips">
                            <label>快捷提问（点击填入输入框）</label>
                            <button type="button" class="chip" data-q="四川历史上发生过哪些著名地震？简要说明。"><i class="fas fa-mountain"></i>四川历史地震</button>
                            <button type="button" class="chip" data-q="震级和烈度有什么区别？"><i class="fas fa-ruler-vertical"></i>震级与烈度</button>
                            <button type="button" class="chip" data-q="室内遇到地震时，正确的避险步骤是什么？"><i class="fas fa-house-chimney-crack"></i>室内避险</button>
                            <button type="button" class="chip" data-q="地震预警和地震预报有什么不同？"><i class="fas fa-bell"></i>预警与预报</button>
                            <button type="button" class="chip" data-q="为什么有的地方震感强、有的地方弱？"><i class="fas fa-water"></i>震感差异</button>
                            <button type="button" class="chip" data-q="请根据知识图谱信息，列举震级大于6级的地震事件（若有）。"><i class="fas fa-database"></i>图谱：高震级</button>
                        </div>

                        <div class="chat-wrap">
                            <div class="chat-scroll" id="chatContainer" role="log" aria-live="polite" aria-relevant="additions"></div>
                        </div>

                        <div class="composer">
                            <label for="userInput" class="visually-hidden">输入问题</label>
                            <textarea id="userInput" class="form-control mb-2" rows="2" placeholder="例如：云南近期地震活动有什么特点？"></textarea>
                            <div class="d-flex flex-wrap gap-2 align-items-center">
                                <button type="button" class="btn btn-send" id="sendBtn">
                                    <i class="fas fa-paper-plane me-1"></i>发送
                                </button>
                                <button type="button" class="btn btn-ghost btn-sm" id="clearBtn" title="清空对话区">
                                    <i class="fas fa-eraser me-1"></i>清空对话
                                </button>
                                <button type="button" class="btn btn-ghost btn-sm" onclick="manualUpdateData()" title="从数据源刷新知识图谱">
                                    <i class="fas fa-sync-alt me-1"></i>刷新地震数据
                                </button>
                                <span class="hint-bar ms-auto d-none d-md-inline"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="stat-grid mb-3">
                    <div class="stat-tile">
                        <div class="val" id="totalEarthquakes">—</div>
                        <div class="lbl">知识库地震条数</div>
                    </div>
                    <div class="stat-tile">
                        <div class="val" id="maxMagnitude">—</div>
                        <div class="lbl">最大震级</div>
                    </div>
                    <div class="stat-tile">
                        <div class="val" id="regionCount">—</div>
                        <div class="lbl">地点种类</div>
                    </div>
                </div>

                <div class="card-dark mb-3">
                    <div class="card-h text-white">
                        <i class="fas fa-chart-bar text-warning"></i>
                        震级分布（条形）
                    </div>
                    <div class="card-b">
                        <div class="chart-box" id="magnitudeChart"></div>
                    </div>
                </div>

                <div class="card-dark">
                    <div class="card-h text-white">
                        <i class="fas fa-chart-pie text-warning"></i>
                        地区占比
                    </div>
                    <div class="card-b">
                        <div class="chart-box tall" id="regionChart"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const magnitudeChart = echarts.init(document.getElementById('magnitudeChart'));
        const regionChart = echarts.init(document.getElementById('regionChart'));

        const WELCOME = '你好，我是地震知识助手。你可以问我关于成因、避险、预警、历史震例等问题；我也会尽量结合后台知识图谱中的地震记录来回答。';

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatBotHtml(text) {
            let t = escapeHtml(text || '');
            t = t.replace(/\n/g, '<br>');
            t = t.replace(/\*\*/g, '');
            return t;
        }

        function nowTimeStr() {
            const d = new Date();
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, type, options) {
            const chatContainer = document.getElementById('chatContainer');
            const block = document.createElement('div');
            block.className = 'msg-block ' + (type === 'user' ? 'user' : 'bot');

            const row = document.createElement('div');
            row.className = 'msg-row ' + (type === 'user' ? 'user' : 'bot');

            const av = document.createElement('div');
            av.className = 'msg-avatar ' + (type === 'user' ? 'user' : 'bot');
            av.innerHTML = type === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            if (type === 'user') {
                bubble.innerHTML = '<p class="mb-0">' + escapeHtml(text) + '</p>';
            } else {
                const content = formatBotHtml(text);
                let inner = '<p class="mb-0">' + content + '</p>';
                if (options && options.feedback !== false) {
                    inner += `
                        <div class="feedback-row">
                            <button type="button" class="btn btn-sm btn-outline-success" onclick="submitFeedback(this, 'satisfied')"><i class="fas fa-thumbs-up"></i> 有用</button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="submitFeedback(this, 'unsatisfied')"><i class="fas fa-thumbs-down"></i> 需改进</button>
                        </div>
                        <p class="disclaimer mb-0">以上内容由模型结合知识库生成，仅供科普与参考，不能替代官方预警与应急指引。</p>`;
                }
                bubble.innerHTML = inner;
            }

            row.appendChild(av);
            row.appendChild(bubble);
            block.appendChild(row);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.textContent = nowTimeStr();
            block.appendChild(meta);

            chatContainer.appendChild(block);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        let sending = false;

        function setSending(on) {
            sending = on;
            const btn = document.getElementById('sendBtn');
            const input = document.getElementById('userInput');
            btn.disabled = on;
            input.disabled = on;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const userInput = input.value.trim();
            if (!userInput || sending) return;

            addMessage(userInput, 'user');
            input.value = '';
            autoResize(input);

            const chatContainer = document.getElementById('chatContainer');
            const typingId = 'typingIndicator';
            const typingWrap = document.createElement('div');
            typingWrap.className = 'msg-block bot';
            typingWrap.id = typingId;
            typingWrap.innerHTML = `
                <div class="msg-row bot">
                    <div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
                    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
                </div>`;
            chatContainer.appendChild(typingWrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            setSending(true);
            document.getElementById('connBadge').innerHTML = '<i class="fas fa-circle-notch fa-spin me-1"></i>推理中…';
            document.getElementById('connBadge').className = 'badge-pill';
            document.getElementById('connBadge').style.borderColor = 'rgba(251, 191, 36, 0.5)';
            document.getElementById('connBadge').style.color = 'var(--warn)';

            fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query_type: 'llm',
                    params: { input: userInput }
                })
            })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, data: j }; }); })
            .then(function (res) {
                removeTyping(typingId);
                const data = res.data;
                if (!res.ok || data.error) {
                    addMessage(data.error || data.message || '服务暂时不可用，请稍后重试。', 'bot', { feedback: false });
                    return;
                }
                if (typeof data.response !== 'string' || !data.response.trim()) {
                    addMessage('未收到有效回答，请换种问法或稍后重试。', 'bot');
                    return;
                }
                addMessage(data.response, 'bot');
            })
            .catch(function () {
                removeTyping(typingId);
                addMessage('网络异常，请检查连接后重试。', 'bot', { feedback: false });
            })
            .finally(function () {
                setSending(false);
                document.getElementById('connBadge').innerHTML = '<i class="fas fa-link me-1"></i>服务已连接';
                document.getElementById('connBadge').style.borderColor = 'rgba(52, 211, 153, 0.35)';
                document.getElementById('connBadge').style.color = 'var(--safe)';
            });
        }

        function submitFeedback(button, feedbackType) {
            const fb = button.closest('.feedback-row');
            if (!fb) return;
            fb.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
            const note = document.createElement('span');
            note.className = 'text-muted small';
            note.textContent = feedbackType === 'satisfied' ? '感谢反馈。' : '感谢反馈，我们会持续优化。';
            fb.appendChild(note);
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        document.getElementById('userInput').addEventListener('input', function () { autoResize(this); });

        document.getElementById('userInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        document.getElementById('clearBtn').addEventListener('click', function () {
            const c = document.getElementById('chatContainer');
            c.innerHTML = '';
            addMessage(WELCOME, 'bot', { feedback: false });
        });

        document.querySelectorAll('.chip').forEach(function (chip) {
            chip.addEventListener('click', function () {
                const q = this.getAttribute('data-q');
                const input = document.getElementById('userInput');
                input.value = q;
                autoResize(input);
                input.focus();
            });
        });

        function loadEarthquakeData() {
            fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query_type: 'kg', params: { type: 'all' } })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.results) return;
                updateStats(data.results);
                updateMagnitudeChart(data.results);
                updateRegionChart(data.results);
            })
            .catch(function () {
                document.getElementById('totalEarthquakes').textContent = '—';
            });
        }

        function updateStats(earthquakes) {
            if (!earthquakes.length) {
                document.getElementById('totalEarthquakes').textContent = '0';
                document.getElementById('maxMagnitude').textContent = '—';
                document.getElementById('regionCount').textContent = '0';
                return;
            }
            document.getElementById('totalEarthquakes').textContent = earthquakes.length;
            const magnitudes = earthquakes.map(function (eq) { return eq.magnitude; });
            document.getElementById('maxMagnitude').textContent = Math.max.apply(null, magnitudes).toFixed(1);
            const regions = {};
            earthquakes.forEach(function (eq) { regions[eq.location] = true; });
            document.getElementById('regionCount').textContent = Object.keys(regions).length;
        }

        function updateMagnitudeChart(earthquakes) {
            const dark = {
                textStyle: { color: '#8b95a8' },
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } }
            };
            const locations = earthquakes.map(function (eq) { return eq.location; });
            const magnitudes = earthquakes.map(function (eq) { return eq.magnitude; });
            magnitudeChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: 'rgba(255,255,255,0.1)',
                    textStyle: { color: '#e8ecf4' },
                    formatter: function (params) {
                        var p = params[0];
                        return p.name + '<br/>震级: ' + p.value;
                    }
                },
                grid: { left: '3%', right: '4%', bottom: '18%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: locations,
                    axisLabel: { rotate: 40, interval: 0, color: '#8b95a8', fontSize: 10 },
                    axisLine: dark.axisLine
                },
                yAxis: {
                    type: 'value',
                    name: '震级',
                    nameTextStyle: { color: '#8b95a8' },
                    min: 0,
                    axisLabel: { color: '#8b95a8' },
                    splitLine: dark.splitLine
                },
                series: [{
                    data: magnitudes,
                    type: 'bar',
                    itemStyle: {
                        color: function (params) {
                            var m = params.value;
                            if (m < 3) return '#34d399';
                            if (m < 4) return '#3b82f6';
                            if (m < 5) return '#fbbf24';
                            if (m < 6) return '#f97316';
                            if (m < 7) return '#ef4444';
                            return '#a855f7';
                        },
                        borderRadius: [4, 4, 0, 0]
                    }
                }]
            });
        }

        function updateRegionChart(earthquakes) {
            var regionCount = {};
            earthquakes.forEach(function (eq) {
                regionCount[eq.location] = (regionCount[eq.location] || 0) + 1;
            });
            var pieData = Object.keys(regionCount).map(function (k) {
                return { name: k, value: regionCount[k] };
            });
            regionChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: 'rgba(255,255,255,0.1)',
                    textStyle: { color: '#e8ecf4' }
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'middle',
                    textStyle: { color: '#8b95a8', fontSize: 10 },
                    type: 'scroll'
                },
                series: [{
                    name: '占比',
                    type: 'pie',
                    radius: ['38%', '62%'],
                    center: ['58%', '50%'],
                    data: pieData,
                    label: { color: '#c4cad6', formatter: '{b}\n{c}' },
                    emphasis: {
                        itemStyle: { shadowBlur: 12, shadowColor: 'rgba(0,0,0,0.45)' }
                    }
                }]
            });
        }

        function manualUpdateData() {
            fetch('/api/update-data', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.status === 'success') {
                    addMessage('数据已更新：' + (data.message || ''), 'bot', { feedback: false });
                    loadEarthquakeData();
                } else {
                    addMessage('更新失败：' + (data.message || '未知错误'), 'bot', { feedback: false });
                }
            })
            .catch(function () {
                addMessage('更新请求失败，请稍后重试。', 'bot', { feedback: false });
            });
        }

        window.addEventListener('load', function () {
            addMessage(WELCOME, 'bot', { feedback: false });
            loadEarthquakeData();
            setInterval(loadEarthquakeData, 5 * 60 * 1000);
        });

        window.addEventListener('resize', function () {
            magnitudeChart.resize();
            regionChart.resize();
        });
    </script>
</body>
</html>
