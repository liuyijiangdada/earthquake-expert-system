<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震知识图谱可视化问答</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #165DFF;
            --secondary-color: #0FC6C2;
            --accent-color: #FF7D00;
            --text-color: #333333;
            --light-text: #666666;
            --background-color: #f5f7fa;
            --card-background: #ffffff;
            --border-color: #e8e8e8;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --danger-color: #f5222d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .container {
            margin-top: 20px;
            margin-bottom: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        .header h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: var(--light-text);
            font-size: 1.1rem;
        }
        
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(-5px);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .card-header h3 {
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 25px;
        }
        
        .chat-container {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--card-background);
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) var(--border-color);
        }
        
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }
        
        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background: linear-gradient(135deg, var(--primary-color), #1E88E5);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(22, 93, 255, 0.2);
        }
        
        .bot-message {
            background-color: #f0f4f8;
            color: var(--text-color);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .input-area {
            position: relative;
            margin-bottom: 30px;
        }
        
        .input-group {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 25px;
            overflow: hidden;
        }
        
        .input-group input {
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 25px 0 0 25px;
        }
        
        .input-group input:focus {
            box-shadow: none;
        }
        
        .input-group button {
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 15px 25px;
            font-weight: 600;
            border-radius: 0 25px 25px 0;
            transition: all 0.3s ease;
        }
        
        .input-group button:hover {
            transform: scale(1.05);
        }
        
        .visualization-section {
            margin-top: 30px;
        }
        
        .chart-container {
            height: 400px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--card-background);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .chart-title {
            text-align: center;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--light-text);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(22, 93, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            } 40% {
                transform: scale(1);
            }
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .chat-container {
                height: 350px;
            }
            
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-globe-asia"></i> 地震知识图谱</h1>
            <p>智能问答与数据可视化平台</p>
        </div>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-comments"></i> 智能问答</h3>
                    </div>
                    <div class="card-body">
                        <div class="chat-container" id="chatContainer">
                            <div class="message bot-message">
                                <p>你好！我是地震知识助手，有什么可以帮你的？</p>
                            </div>
                        </div>
                        <div class="input-area">
                            <div class="input-group">
                                <input type="text" class="form-control" id="userInput" placeholder="输入你的问题...">
                                <button class="btn" id="sendBtn">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                            <div class="mt-2 text-right">
                                <button class="btn btn-sm btn-outline-primary" onclick="manualUpdateData()">
                                    <i class="fas fa-sync-alt"></i> 刷新地震数据
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="stat-value" id="totalEarthquakes">0</div>
                        <div class="stat-label">总地震数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value" id="maxMagnitude">0</div>
                        <div class="stat-label">最大震级</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="stat-value" id="regionCount">0</div>
                        <div class="stat-label">涉及地区</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-chart-bar"></i> 震级分布</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="magnitudeChart"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row visualization-section">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-map"></i> 地区分布</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="regionChart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化图表
        const magnitudeChart = echarts.init(document.getElementById('magnitudeChart'));
        const regionChart = echarts.init(document.getElementById('regionChart'));
        
        // 发送消息函数
        function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            if (!userInput.trim()) return;
            
            // 添加用户消息
            addMessage(userInput, 'user');
            
            // 清空输入框
            document.getElementById('userInput').value = '';
            
            // 添加正在输入指示器
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 发送请求到后端
            fetch('/api/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query_type: 'llm',
                    params: {
                        input: userInput
                    }
                })
            })
            .then(response => response.json())
            .then(data => {
                // 移除正在输入指示器
                document.getElementById('typingIndicator').remove();
                // 添加机器人回复
                addMessage(data.response, 'bot');
            })
            .catch(error => {
                console.error('Error:', error);
                // 移除正在输入指示器
                document.getElementById('typingIndicator').remove();
                addMessage('抱歉，处理请求时出错了。', 'bot');
            });
        }
        
        // 添加消息到聊天窗口
        function addMessage(text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            // 处理长文本，添加适当的换行和格式
            text = text.replace(/\n/g, '<br>');
            // 移除**符号
            text = text.replace(/\*\*/g, '');
            messageDiv.innerHTML = `<p>${text}</p>`;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 绑定发送按钮事件
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        // 绑定回车事件
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 加载地震数据
        function loadEarthquakeData() {
            fetch('/api/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query_type: 'kg',
                    params: {
                        type: 'all'
                    }
                })
            })
            .then(response => response.json())
            .then(data => {
                const earthquakes = data.results;
                updateStats(earthquakes);
                updateMagnitudeChart(earthquakes);
                updateRegionChart(earthquakes);
            })
            .catch(error => {
                console.error('Error loading data:', error);
            });
        }
        
        // 更新统计数据
        function updateStats(earthquakes) {
            document.getElementById('totalEarthquakes').textContent = earthquakes.length;
            
            const magnitudes = earthquakes.map(eq => eq.magnitude);
            const maxMagnitude = Math.max(...magnitudes);
            document.getElementById('maxMagnitude').textContent = maxMagnitude.toFixed(1);
            
            const regions = [...new Set(earthquakes.map(eq => eq.location))];
            document.getElementById('regionCount').textContent = regions.length;
        }
        
        // 更新震级分布图表
        function updateMagnitudeChart(earthquakes) {
            const locations = earthquakes.map(eq => eq.location);
            const magnitudes = earthquakes.map(eq => eq.magnitude);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: function(params) {
                        const data = params[0];
                        return `${data.name}<br/>震级: ${data.value}`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: locations,
                    axisLabel: {
                        rotate: 45,
                        interval: 0
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '震级',
                    min: 0
                },
                series: [{
                    data: magnitudes,
                    type: 'bar',
                    itemStyle: {
                        color: function(params) {
                            const magnitude = params.value;
                            if (magnitude < 3.0) return '#52c41a';
                            if (magnitude < 4.0) return '#1890ff';
                            if (magnitude < 5.0) return '#faad14';
                            if (magnitude < 6.0) return '#fa8c16';
                            if (magnitude < 7.0) return '#f5222d';
                            return '#722ed1';
                        }
                    },
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            
            magnitudeChart.setOption(option);
        }
        
        // 更新地区分布图表
        function updateRegionChart(earthquakes) {
            // 统计各地区地震数量
            const regionCount = {};
            earthquakes.forEach(eq => {
                if (regionCount[eq.location]) {
                    regionCount[eq.location]++;
                } else {
                    regionCount[eq.location] = 1;
                }
            });
            
            const regions = Object.keys(regionCount);
            const counts = Object.values(regionCount);
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    data: regions
                },
                series: [{
                    name: '地震分布',
                    type: 'pie',
                    radius: '60%',
                    center: ['50%', '50%'],
                    data: regions.map((region, index) => ({
                        value: counts[index],
                        name: region
                    })),
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    },
                    label: {
                        formatter: '{b}: {c}'
                    }
                }]
            };
            
            regionChart.setOption(option);
        }
        
        // 页面加载完成后加载数据
        window.onload = function() {
            loadEarthquakeData();
            // 每5分钟自动更新数据
            setInterval(loadEarthquakeData, 5 * 60 * 1000);
        };
        
        // 手动更新数据
        function manualUpdateData() {
            fetch('/api/update-data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // 显示更新成功消息
                    addMessage(`数据更新成功：${data.message}`, 'bot');
                    // 重新加载数据
                    loadEarthquakeData();
                } else {
                    addMessage(`数据更新失败：${data.message}`, 'bot');
                }
            })
            .catch(error => {
                console.error('Error updating data:', error);
                addMessage('数据更新失败，请稍后再试。', 'bot');
            });
        }
        
        // 窗口大小改变时重绘图表
        window.onresize = function() {
            magnitudeChart.resize();
            regionChart.resize();
        };
    </script>
</body>
</html>
