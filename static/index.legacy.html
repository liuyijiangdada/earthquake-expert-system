<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震智能问答 · 知识图谱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-deep: #0c1222;
            --bg-card: #121a2e;
            --bg-chat: #0e1528;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8ecf4;
            --muted: #8b95a8;
            --accent: #3d9eff;
            --accent-dim: #2563c4;
            --safe: #34d399;
            --warn: #fbbf24;
            --danger: #f87171;
            --user-bubble: linear-gradient(135deg, #1e4a8f 0%, #2563eb 100%);
            --bot-bubble: #1a2438;
            --chip: rgba(61, 158, 255, 0.15);
            --chip-hover: rgba(61, 158, 255, 0.28);
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* subtle seismic grid + glow */
        .page-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.25), transparent),
                linear-gradient(180deg, #0c1222 0%, #0a0f1a 100%);
            z-index: -1;
        }
        .page-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 39px,
                rgba(255, 255, 255, 0.02) 39px,
                rgba(255, 255, 255, 0.02) 40px
            );
            opacity: 0.5;
        }

        .app-header {
            border-bottom: 1px solid var(--border);
            background: rgba(12, 18, 34, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.02em;
        }
        .app-header .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin: 0.25rem 0 0;
        }
        .badge-pill {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            background: rgba(52, 211, 153, 0.15);
            color: var(--safe);
            border: 1px solid rgba(52, 211, 153, 0.35);
        }

        .card-dark {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-dark .card-h {
            padding: 0.9rem 1.15rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-dark .card-b { padding: 1rem; }

        .chat-wrap {
            display: flex;
            flex-direction: column;
            min-height: 520px;
            max-height: min(72vh, 720px);
        }
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--bg-chat);
            border-radius: 12px;
            border: 1px solid var(--border);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) transparent;
        }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: var(--accent-dim);
            border-radius: 3px;
        }

        .msg-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.1rem;
            animation: fadeIn 0.35s ease;
        }
        .msg-row.user { flex-direction: row-reverse; }
        .msg-block { margin-bottom: 0.35rem; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .msg-avatar.bot {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff;
        }
        .msg-avatar.user {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
        }
        .msg-bubble {
            max-width: min(100%, 640px);
            padding: 0.85rem 1.05rem;
            border-radius: 14px;
            font-size: 0.95rem;
        }
        .msg-row.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
        }
        .msg-meta {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }
        .msg-block.bot .msg-meta { padding-left: calc(38px + 0.75rem); }
        .msg-block.user .msg-meta { text-align: right; padding-right: calc(38px + 0.75rem); }
        .hint-bar {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.5rem;
            padding: 0 0.25rem;
        }

        .quick-panel {
            margin-bottom: 1rem;
            padding: 0.85rem 1rem;
            background: rgba(10, 16, 31, 0.65);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        .quick-panel-top {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem 1rem;
            margin-bottom: 0.65rem;
        }
        .quick-panel-top .title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .quick-panel-top .title i { color: var(--accent); font-size: 0.9rem; }
        .quick-hint {
            font-size: 0.72rem;
            color: var(--muted);
            margin: 0;
            line-height: 1.45;
            max-width: 100%;
        }
        .quick-hint kbd {
            display: inline-block;
            padding: 0.08rem 0.35rem;
            font-size: 0.68rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
        }
        .quick-groups {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .quick-group-title {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin: 0 0 0.4rem;
        }
        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        @media (max-width: 576px) {
            .quick-chips {
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                padding-bottom: 0.35rem;
                margin-bottom: -0.15rem;
                scroll-snap-type: x proximity;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: thin;
                scrollbar-color: var(--accent-dim) transparent;
            }
            .quick-chips::-webkit-scrollbar { height: 4px; }
            .quick-chips::-webkit-scrollbar-thumb {
                background: var(--accent-dim);
                border-radius: 2px;
            }
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            font-size: 0.8rem;
            background: var(--chip);
            color: var(--text);
            border: 1px solid transparent;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            flex-shrink: 0;
            scroll-snap-align: start;
        }
        .chip:hover {
            background: var(--chip-hover);
            border-color: rgba(61, 158, 255, 0.4);
        }
        .chip:focus-visible {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 158, 255, 0.2);
        }
        .chip:active { transform: scale(0.98); }
        .chip.is-active {
            background: rgba(61, 158, 255, 0.22);
            border-color: rgba(61, 158, 255, 0.55);
            box-shadow: 0 0 0 1px rgba(61, 158, 255, 0.25);
        }
        .chip i { font-size: 0.75rem; opacity: 0.85; }

        .composer {
            margin-top: 0.85rem;
        }
        .composer textarea {
            background: #0a101f;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            resize: none;
            min-height: 48px;
            max-height: 140px;
        }
        .composer textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 158, 255, 0.15);
            outline: none;
        }
        .composer .btn-send {
            border-radius: 12px;
            padding: 0.65rem 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: #fff;
        }
        .composer .btn-send:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .composer .btn-ghost {
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: transparent;
        }
        .composer .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 0.5rem 0;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.2s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.65rem;
        }
        @media (max-width: 991px) {
            .stat-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .stat-tile {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
        }
        .stat-tile .val {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-tile .lbl {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        .chart-box {
            height: 260px;
            width: 100%;
        }
        .chart-box.tall { height: 280px; }

        .insight-hint {
            font-size: 0.72rem;
            color: var(--muted);
            margin: 0 0 0.5rem;
            line-height: 1.45;
        }
        .depth-strip {
            font-size: 0.72rem;
            color: var(--muted);
            padding-top: 0.35rem;
            border-top: 1px solid var(--border);
        }
        .depth-strip span strong { color: var(--accent); font-weight: 600; }

        .feedback-row {
            margin-top: 0.65rem;
            padding-top: 0.65rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .feedback-row .btn-sm {
            border-radius: 8px;
            font-size: 0.78rem;
        }
        .disclaimer {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="app-header">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                <div>
                    <h1><i class="fas fa-wave-square text-info me-2"></i>地震智能问答工作台</h1>
                    <p class="subtitle">知识图谱检索 + 大模型推理 · 面向公众科普与应急认知</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge-pill" id="connBadge"><i class="fas fa-link me-1"></i>服务已连接</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-dark h-100">
                    <div class="card-h text-white">
                        <i class="fas fa-comments text-info"></i>
                        对话区
                    </div>
                    <div class="card-b">
                        <section class="quick-panel" aria-label="快捷提问">
                            <div class="quick-panel-top">
                                <h2 class="title"><i class="fas fa-bolt" aria-hidden="true"></i>快捷提问</h2>
                                <p class="quick-hint">单击填入输入框；双击立即发送。<span class="d-none d-sm-inline">按住 <kbd>⌘</kbd>/<kbd>Ctrl</kbd> 单击也可直接发送。</span></p>
                            </div>
                            <div class="quick-groups">
                                <div>
                                    <p class="quick-group-title">科普与概念</p>
                                    <div class="quick-chips" role="group" aria-label="科普与概念">
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="历史上发生过哪些较为著名的地震事件？请简要列举并说明。"><i class="fas fa-mountain" aria-hidden="true"></i>历史著名地震</button>
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="震级和烈度有什么区别？"><i class="fas fa-ruler-vertical" aria-hidden="true"></i>震级与烈度</button>
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="地震预警和地震预报有什么不同？"><i class="fas fa-bell" aria-hidden="true"></i>预警与预报</button>
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="为什么有的地方震感强、有的地方弱？"><i class="fas fa-water" aria-hidden="true"></i>震感差异</button>
                                    </div>
                                </div>
                                <div>
                                    <p class="quick-group-title">应急与安全</p>
                                    <div class="quick-chips" role="group" aria-label="应急与安全">
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="室内遇到地震时，正确的避险步骤是什么？"><i class="fas fa-house-chimney-crack" aria-hidden="true"></i>室内避险</button>
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="地震发生后，户外人员应注意哪些事项？"><i class="fas fa-person-walking" aria-hidden="true"></i>户外注意</button>
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="家庭应急包建议准备哪些物品？"><i class="fas fa-kit-medical" aria-hidden="true"></i>应急包</button>
                                    </div>
                                </div>
                                <div>
                                    <p class="quick-group-title">结合知识图谱</p>
                                    <div class="quick-chips" role="group" aria-label="结合知识图谱">
                                        <button type="button" class="chip" title="单击填入，双击立即发送" data-q="请根据知识图谱信息，列举震级大于6级的地震事件（若有）。"><i class="fas fa-database" aria-hidden="true"></i>高震级事件</button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <div class="chat-wrap">
                            <div class="chat-scroll" id="chatContainer" role="log" aria-live="polite" aria-relevant="additions"></div>
                        </div>

                        <div class="composer">
                            <label for="userInput" class="visually-hidden">输入问题</label>
                            <textarea id="userInput" class="form-control mb-2" rows="2" placeholder="例如：云南近期地震活动有什么特点？"></textarea>
                            <div class="d-flex flex-wrap gap-2 align-items-center">
                                <button type="button" class="btn btn-send" id="sendBtn">
                                    <i class="fas fa-paper-plane me-1"></i>发送
                                </button>
                                <button type="button" class="btn btn-ghost btn-sm" id="clearBtn" title="清空对话区">
                                    <i class="fas fa-eraser me-1"></i>清空对话
                                </button>
                                <button type="button" class="btn btn-ghost btn-sm" onclick="manualUpdateData()" title="从数据源刷新知识图谱">
                                    <i class="fas fa-sync-alt me-1"></i>刷新地震数据
                                </button>
                                <span class="hint-bar ms-auto d-none d-md-inline"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="stat-grid mb-3">
                    <div class="stat-tile">
                        <div class="val" id="totalEarthquakes">—</div>
                        <div class="lbl">知识库地震条数</div>
                    </div>
                    <div class="stat-tile">
                        <div class="val" id="maxMagnitude">—</div>
                        <div class="lbl">最大震级</div>
                    </div>
                    <div class="stat-tile">
                        <div class="val" id="regionCount">—</div>
                        <div class="lbl">地点种类</div>
                    </div>
                </div>

                <div class="card-dark">
                    <div class="card-h text-white">
                        <i class="fas fa-bolt text-warning"></i>
                        震级分级与震源深度
                    </div>
                    <div class="card-b">
                        <p class="insight-hint">按震级区间统计当前知识库条数；深度按浅源(&lt;70km)、中源(70–300km)、深源(&gt;300km)划分，便于观察能量释放深度特征。</p>
                        <div class="chart-box tall" id="insightChart"></div>
                        <div class="depth-strip text-center" id="depthStrip">
                            浅源 <strong id="depthShallow">—</strong> 条 ·
                            中源 <strong id="depthMid">—</strong> 条 ·
                            深源 <strong id="depthDeep">—</strong> 条
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const insightChart = echarts.init(document.getElementById('insightChart'));

        const WELCOME = '你好，我是地震知识助手。你可以问我关于成因、避险、预警、历史震例等问题；我也会尽量结合后台知识图谱中的地震记录来回答。';

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatBotHtml(text) {
            let t = escapeHtml(text || '');
            t = t.replace(/\n/g, '<br>');
            t = t.replace(/\*\*/g, '');
            return t;
        }

        function nowTimeStr() {
            const d = new Date();
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, type, options) {
            const chatContainer = document.getElementById('chatContainer');
            const block = document.createElement('div');
            block.className = 'msg-block ' + (type === 'user' ? 'user' : 'bot');

            const row = document.createElement('div');
            row.className = 'msg-row ' + (type === 'user' ? 'user' : 'bot');

            const av = document.createElement('div');
            av.className = 'msg-avatar ' + (type === 'user' ? 'user' : 'bot');
            av.innerHTML = type === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            if (type === 'user') {
                bubble.innerHTML = '<p class="mb-0">' + escapeHtml(text) + '</p>';
            } else {
                const content = formatBotHtml(text);
                let inner = '<p class="mb-0">' + content + '</p>';
                if (options && options.feedback !== false) {
                    inner += `
                        <div class="feedback-row">
                            <button type="button" class="btn btn-sm btn-outline-success" onclick="submitFeedback(this, 'satisfied')"><i class="fas fa-thumbs-up"></i> 有用</button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="submitFeedback(this, 'unsatisfied')"><i class="fas fa-thumbs-down"></i> 需改进</button>
                        </div>
                        <p class="disclaimer mb-0">以上内容由模型结合知识库生成，仅供科普与参考，不能替代官方预警与应急指引。</p>`;
                }
                bubble.innerHTML = inner;
            }

            row.appendChild(av);
            row.appendChild(bubble);
            block.appendChild(row);

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.textContent = nowTimeStr();
            block.appendChild(meta);

            chatContainer.appendChild(block);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        let sending = false;

        function setSending(on) {
            sending = on;
            const btn = document.getElementById('sendBtn');
            const input = document.getElementById('userInput');
            btn.disabled = on;
            input.disabled = on;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const userInput = input.value.trim();
            if (!userInput || sending) return;

            addMessage(userInput, 'user');
            input.value = '';
            autoResize(input);
            syncQuickChipActive();

            const chatContainer = document.getElementById('chatContainer');
            const typingId = 'typingIndicator';
            const typingWrap = document.createElement('div');
            typingWrap.className = 'msg-block bot';
            typingWrap.id = typingId;
            typingWrap.innerHTML = `
                <div class="msg-row bot">
                    <div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
                    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
                </div>`;
            chatContainer.appendChild(typingWrap);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            setSending(true);
            document.getElementById('connBadge').innerHTML = '<i class="fas fa-circle-notch fa-spin me-1"></i>推理中…';
            document.getElementById('connBadge').className = 'badge-pill';
            document.getElementById('connBadge').style.borderColor = 'rgba(251, 191, 36, 0.5)';
            document.getElementById('connBadge').style.color = 'var(--warn)';

            fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query_type: 'llm',
                    params: { input: userInput }
                })
            })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, data: j }; }); })
            .then(function (res) {
                removeTyping(typingId);
                const data = res.data;
                if (!res.ok || data.error) {
                    addMessage(data.error || data.message || '服务暂时不可用，请稍后重试。', 'bot', { feedback: false });
                    return;
                }
                if (typeof data.response !== 'string' || !data.response.trim()) {
                    addMessage('未收到有效回答，请换种问法或稍后重试。', 'bot');
                    return;
                }
                addMessage(data.response, 'bot');
            })
            .catch(function () {
                removeTyping(typingId);
                addMessage('网络异常，请检查连接后重试。', 'bot', { feedback: false });
            })
            .finally(function () {
                setSending(false);
                document.getElementById('connBadge').innerHTML = '<i class="fas fa-link me-1"></i>服务已连接';
                document.getElementById('connBadge').style.borderColor = 'rgba(52, 211, 153, 0.35)';
                document.getElementById('connBadge').style.color = 'var(--safe)';
            });
        }

        function submitFeedback(button, feedbackType) {
            const fb = button.closest('.feedback-row');
            if (!fb) return;
            fb.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
            const note = document.createElement('span');
            note.className = 'text-muted small';
            note.textContent = feedbackType === 'satisfied' ? '感谢反馈。' : '感谢反馈，我们会持续优化。';
            fb.appendChild(note);
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        document.getElementById('userInput').addEventListener('input', function () {
            autoResize(this);
            syncQuickChipActive();
        });

        document.getElementById('userInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        document.getElementById('clearBtn').addEventListener('click', function () {
            const c = document.getElementById('chatContainer');
            c.innerHTML = '';
            addMessage(WELCOME, 'bot', { feedback: false });
        });

        function getAllChips() {
            return document.querySelectorAll('.quick-panel .chip');
        }

        function syncQuickChipActive() {
            const input = document.getElementById('userInput');
            const v = input.value.trim();
            getAllChips().forEach(function (chip) {
                const q = chip.getAttribute('data-q') || '';
                const on = v !== '' && v === q;
                chip.classList.toggle('is-active', on);
                chip.setAttribute('aria-pressed', on ? 'true' : 'false');
            });
        }

        function applyQuickQuestion(chip, andSend) {
            const q = chip.getAttribute('data-q');
            if (!q) return;
            const input = document.getElementById('userInput');
            input.value = q;
            autoResize(input);
            syncQuickChipActive();
            if (andSend) {
                input.focus();
                sendMessage();
            } else {
                input.focus();
                try { input.setSelectionRange(q.length, q.length); } catch (e) { /* ignore */ }
            }
        }

        document.querySelector('.quick-panel').addEventListener('click', function (e) {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            if (e.metaKey || e.ctrlKey) {
                e.preventDefault();
                e.stopPropagation();
                applyQuickQuestion(chip, true);
            }
        }, true);

        document.querySelector('.quick-panel').addEventListener('dblclick', function (e) {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            e.preventDefault();
            applyQuickQuestion(chip, true);
        });

        getAllChips().forEach(function (chip) {
            chip.setAttribute('aria-pressed', 'false');
            chip.addEventListener('click', function (e) {
                if (e.metaKey || e.ctrlKey) return;
                applyQuickQuestion(chip, false);
            });
        });

        function loadEarthquakeData() {
            fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query_type: 'kg', params: { type: 'all' } })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.results) return;
                updateStats(data.results);
                updateInsightModule(data.results);
            })
            .catch(function () {
                document.getElementById('totalEarthquakes').textContent = '—';
            });
        }

        function updateStats(earthquakes) {
            if (!earthquakes.length) {
                document.getElementById('totalEarthquakes').textContent = '0';
                document.getElementById('maxMagnitude').textContent = '—';
                document.getElementById('regionCount').textContent = '0';
                document.getElementById('depthShallow').textContent = '—';
                document.getElementById('depthMid').textContent = '—';
                document.getElementById('depthDeep').textContent = '—';
                return;
            }
            document.getElementById('totalEarthquakes').textContent = earthquakes.length;
            const magnitudes = earthquakes.map(function (eq) { return eq.magnitude; });
            document.getElementById('maxMagnitude').textContent = Math.max.apply(null, magnitudes).toFixed(1);
            const regions = {};
            earthquakes.forEach(function (eq) { regions[eq.location] = true; });
            document.getElementById('regionCount').textContent = Object.keys(regions).length;
        }

        function updateInsightModule(earthquakes) {
            var magLabels = ['<3 微震', '3–4 小震', '4–5 中震', '5–6 强震', '≥6 大震'];
            var magBins = [0, 0, 0, 0, 0];
            var shallow = 0, mid = 0, deep = 0;
            earthquakes.forEach(function (eq) {
                var m = parseFloat(eq.magnitude);
                if (isNaN(m)) return;
                if (m < 3) magBins[0]++;
                else if (m < 4) magBins[1]++;
                else if (m < 5) magBins[2]++;
                else if (m < 6) magBins[3]++;
                else magBins[4]++;
                var d = parseFloat(eq.depth);
                if (isNaN(d)) return;
                if (d < 70) shallow++;
                else if (d <= 300) mid++;
                else deep++;
            });
            var pieData = [];
            for (var i = 0; i < magLabels.length; i++) {
                pieData.push({ name: magLabels[i], value: magBins[i] });
            }
            document.getElementById('depthShallow').textContent = shallow;
            document.getElementById('depthMid').textContent = mid;
            document.getElementById('depthDeep').textContent = deep;

            insightChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: 'rgba(255,255,255,0.1)',
                    textStyle: { color: '#e8ecf4' },
                    formatter: function (p) {
                        return p.name + '<br/>条数：' + p.value + (p.percent != null ? '（' + p.percent + '%）' : '');
                    }
                },
                legend: {
                    orient: 'horizontal',
                    bottom: 0,
                    left: 'center',
                    textStyle: { color: '#8b95a8', fontSize: 10 }
                },
                series: [{
                    name: '震级分级',
                    type: 'pie',
                    radius: ['42%', '68%'],
                    center: ['50%', '44%'],
                    avoidLabelOverlap: true,
                    itemStyle: {
                        borderRadius: 6,
                        borderColor: '#121a2e',
                        borderWidth: 2
                    },
                    label: { color: '#c4cad6', fontSize: 11, formatter: '{b}\n{c}条' },
                    data: pieData,
                    color: ['#34d399', '#3b82f6', '#fbbf24', '#f97316', '#ef4444'],
                    emphasis: {
                        itemStyle: { shadowBlur: 14, shadowColor: 'rgba(0,0,0,0.5)' }
                    }
                }]
            });
        }

        function manualUpdateData() {
            fetch('/api/update-data', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.status === 'success') {
                    addMessage('数据已更新：' + (data.message || ''), 'bot', { feedback: false });
                    loadEarthquakeData();
                } else {
                    addMessage('更新失败：' + (data.message || '未知错误'), 'bot', { feedback: false });
                }
            })
            .catch(function () {
                addMessage('更新请求失败，请稍后重试。', 'bot', { feedback: false });
            });
        }

        window.addEventListener('load', function () {
            addMessage(WELCOME, 'bot', { feedback: false });
            loadEarthquakeData();
            setInterval(loadEarthquakeData, 5 * 60 * 1000);
        });

        window.addEventListener('resize', function () {
            insightChart.resize();
        });
    </script>
</body>
</html>
